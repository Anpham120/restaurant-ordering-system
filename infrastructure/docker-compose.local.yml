services:
  postgres:
    image: postgres:16
    container_name: restaurant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restaurant
      POSTGRES_PASSWORD: restaurant
      POSTGRES_DB: restaurant_ordering
    ports:
      - "5432:5432"
    volumes:
      - restaurant_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant -d restaurant_ordering"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: restaurant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - restaurant_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ../services/ai-service
      dockerfile: Dockerfile
    container_name: restaurant-ai-service
    restart: unless-stopped
    environment:
      AI_SERVICE_KNOWLEDGE_BASE_PATH: /app/knowledge_base
      AI_SERVICE_LLM_PROVIDER: ${AI_SERVICE_LLM_PROVIDER:-9router}
      AI_SERVICE_LLM_MODEL: ${AI_SERVICE_LLM_MODEL:-9router}
      AI_SERVICE_LLM_BASE_URL: ${AI_SERVICE_LLM_BASE_URL:-http://host.docker.internal:20128/v1}
      AI_SERVICE_LLM_API_KEY: ${AI_SERVICE_LLM_API_KEY:-}
      AI_SERVICE_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8000:8000"
    volumes:
      - ../services/ai-service/knowledge_base:/app/knowledge_base
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  restaurant-api:
    build:
      context: ../backend/restaurant-api
      dockerfile: Dockerfile
    container_name: restaurant-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=restaurant_ordering;Username=restaurant;Password=restaurant"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  admin-web:
    build:
      context: ../frontend/admin-web
      dockerfile: Dockerfile
    container_name: restaurant-admin-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
      - VITE_AI_BASE_URL=http://localhost:8000

  customer-web:
    build:
      context: ../frontend/customer-web
      dockerfile: Dockerfile
    container_name: restaurant-customer-web
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
      - VITE_AI_BASE_URL=http://localhost:8000

volumes:
  restaurant_postgres_data:
  restaurant_redis_data:
